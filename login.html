!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login &bull; Zalren</title>
    <meta name="description" content="Login to your Zalren account">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle, rgba(10, 14, 20, 0.85), rgba(6, 9, 14, 0.98)), url('purple_bg.png') no-repeat center center;
            background-size: cover;
            position: relative;
            overflow: hidden;
        }

        /* Animated background orbs */
        .auth-page::before {
            content: '';
            position: fixed;
            top: -200px;
            left: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0,229,255,0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: orbFloat1 8s ease-in-out infinite;
        }
        .auth-page::after {
            content: '';
            position: fixed;
            bottom: -200px;
            right: -200px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0,100,180,0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: orbFloat2 10s ease-in-out infinite;
        }
        @keyframes orbFloat1 {
            0%,100% { transform: translate(0,0); }
            50% { transform: translate(60px, 40px); }
        }
        @keyframes orbFloat2 {
            0%,100% { transform: translate(0,0); }
            50% { transform: translate(-40px, -60px); }
        }

        .auth-navbar {
            padding: 18px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            background: rgba(17,24,35,0.9);
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 10;
        }

        .auth-nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .auth-nav-logo img { height: 38px; }
        .auth-nav-logo span {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
        }
        .auth-nav-logo span em {
            color: var(--p-color);
            font-style: normal;
        }

        .auth-back-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s;
        }
        .auth-back-link:hover { color: var(--p-color); }

        /* Main auth layout */
        .auth-body {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            position: relative;
            z-index: 5;
        }

        .auth-card {
            background: rgba(17, 24, 35, 0.9);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 50px 45px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,229,255,0.05);
            backdrop-filter: blur(20px);
            animation: cardIn 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .auth-logo-center {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-logo-center img {
            height: 80px;
            filter: drop-shadow(0 0 20px rgba(0,229,255,0.3));
            animation: floatAnim 4s ease-in-out infinite;
        }

        .auth-heading {
            text-align: center;
            margin-bottom: 35px;
        }
        .auth-heading h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 8px;
            color: var(--text-main);
        }
        .auth-heading h1 span { color: var(--p-color); }
        .auth-heading p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .input-wrapper {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.9rem;
            pointer-events: none;
            transition: color 0.3s;
        }
        .form-input {
            width: 100%;
            padding: 13px 14px 13px 40px;
            background: rgba(10, 14, 20, 0.8);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: var(--text-main);
            font-family: var(--font-family);
            font-size: 0.95rem;
            transition: all 0.3s;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--p-color);
            background: rgba(0,229,255,0.03);
            box-shadow: 0 0 0 3px rgba(0,229,255,0.08);
        }
        .form-input:focus + .input-icon,
        .input-wrapper:focus-within .input-icon {
            color: var(--p-color);
        }
        .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.9rem;
            transition: color 0.3s;
            padding: 0;
        }
        .toggle-pw:hover { color: var(--p-color); }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .checkbox-label input[type="checkbox"] {
            accent-color: var(--p-color);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .forgot-link {
            color: var(--p-color);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: opacity 0.3s;
        }
        .forgot-link:hover { opacity: 0.7; }

        .auth-submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--p-color);
            color: var(--bg-dark);
            border: none;
            border-radius: 10px;
            font-family: var(--font-family);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(0,229,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .auth-submit-btn:hover {
            background: #fff;
            box-shadow: 0 0 30px rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        .auth-submit-btn:active { transform: translateY(0); }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 25px 0;
        }
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.08);
        }
        .auth-divider span {
            color: var(--text-muted);
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .auth-footer-link {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        .auth-footer-link a {
            color: var(--p-color);
            text-decoration: none;
            font-weight: 700;
            transition: opacity 0.3s;
        }
        .auth-footer-link a:hover { opacity: 0.7; }

        /* Error / Success messages */
        .form-message {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: none;
        }
        .form-message.error {
            background: rgba(255, 23, 68, 0.1);
            border: 1px solid rgba(255, 23, 68, 0.3);
            color: #ff1744;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-message.success {
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid rgba(0, 229, 255, 0.3);
            color: var(--p-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-error {
            border-color: #ff1744 !important;
        }
        .field-error {
            color: #ff1744;
            font-size: 0.8rem;
            margin-top: 5px;
            display: none;
        }
        .field-error.show { display: block; }

        @media (max-width: 500px) {
            .auth-card { padding: 35px 25px; }
            .auth-heading h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <!-- Navbar -->
        <nav class="auth-navbar">
            <a href="index.html" class="auth-nav-logo">
                <img src="logo.png" alt="Zalren">
                <span>Zalren<em>SMP</em></span>
            </a>
            <a href="index.html" class="auth-back-link">
                <i class="fa-solid fa-arrow-left"></i> Back to Home
            </a>
        </nav>

        <!-- Login Card -->
        <div class="auth-body">
            <div class="auth-card">
                <div class="auth-logo-center">
                    <img src="logo.png" alt="Zalren Logo">
                </div>

                <div class="auth-heading">
                    <h1>Welcome <span>Back!</span></h1>
                    <p>Sign in to your Zalren community account</p>
                </div>

                <div class="form-message" id="login-message"></div>

                <form id="login-form" novalidate>
                    <div class="form-group">
                        <label>Username or Email</label>
                        <div class="input-wrapper">
                            <input type="text" id="login-user" class="form-input" placeholder="Your Minecraft name or email" autocomplete="username">
                            <i class="fa-solid fa-user input-icon"></i>
                        </div>
                        <div class="field-error" id="login-user-err">Please enter your username or email.</div>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="login-pass" class="form-input" placeholder="••••••••" autocomplete="current-password">
                            <i class="fa-solid fa-lock input-icon"></i>
                            <button type="button" class="toggle-pw" data-target="login-pass">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                        <div class="field-error" id="login-pass-err">Please enter your password.</div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="remember-me">
                            Remember me
                        </label>
                        <a href="forgotpassword.html" class="forgot-link">Forgot password?</a>
                    </div>

                    <button type="submit" class="auth-submit-btn" id="login-submit-btn">
                        <i class="fa-solid fa-right-to-bracket"></i>
                        Sign In
                    </button>
                </form>

                <div class="auth-divider"><span>Don't have an account?</span></div>

                <div class="auth-footer-link">
                    <a href="register.html">Create a free account &rarr;</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Show/hide password toggle
        document.querySelectorAll('.toggle-pw').forEach(btn => {
            btn.addEventListener('click', () => {
                const targetId = btn.dataset.target;
                const input = document.getElementById(targetId);
                const icon = btn.querySelector('i');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.replace('fa-eye', 'fa-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.replace('fa-eye-slash', 'fa-eye');
                }
            });
        });

        // Form validation
        const loginForm = document.getElementById('login-form');
        const loginMsg  = document.getElementById('login-message');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            let valid = true;

            const user = document.getElementById('login-user');
            const pass = document.getElementById('login-pass');
            const userErr = document.getElementById('login-user-err');
            const passErr = document.getElementById('login-pass-err');

            // Reset
            [user, pass].forEach(el => el.classList.remove('input-error'));
            [userErr, passErr].forEach(el => el.classList.remove('show'));
            loginMsg.className = 'form-message';
            loginMsg.style.display = 'none';

            if (!user.value.trim()) {
                user.classList.add('input-error');
                userErr.classList.add('show');
                valid = false;
            }
            if (!pass.value.trim()) {
                pass.classList.add('input-error');
                passErr.classList.add('show');
                valid = false;
            }

            if (!valid) return;

            const btn = document.getElementById('login-submit-btn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing in...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        usernameOrEmail: user.value.trim(),
                        password: pass.value
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Login failed');
                }

                // Success
                loginMsg.className = 'form-message success';
                loginMsg.innerHTML = '<i class="fa-solid fa-circle-check"></i> Login successful! Redirecting to home...';
                loginMsg.style.display = 'flex';
                
                // Store logged in user info + session token (used by admin panel + navbar)
                localStorage.setItem('user', JSON.stringify(data.user));
                if (data.token) localStorage.setItem('token', data.token);

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } catch (err) {
                btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Sign In';
                btn.disabled = false;
                loginMsg.className = 'form-message error';
                loginMsg.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> ${err.message}`;
                loginMsg.style.display = 'flex';
            }
        });
    </script>
</body>
</html>
