!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password &bull; Zalren</title>
    <meta name="description" content="Set a new password for your Zalren account">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle, rgba(10, 14, 20, 0.85), rgba(6, 9, 14, 0.98)), url('purple_bg.png') no-repeat center center;
            background-size: cover;
            position: relative;
            overflow: hidden;
        }

        .auth-page::before, .auth-page::after {
            content: ''; position: fixed; border-radius: 50%; pointer-events: none;
        }
        .auth-page::before {
            top: -200px; left: -200px; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(0,229,255,0.08) 0%, transparent 70%);
            animation: orbFloat1 8s ease-in-out infinite;
        }
        .auth-page::after {
            bottom: -200px; right: -200px; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0,100,180,0.08) 0%, transparent 70%);
            animation: orbFloat2 10s ease-in-out infinite;
        }
        @keyframes orbFloat1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(60px,40px)} }
        @keyframes orbFloat2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-40px,-60px)} }

        .auth-navbar {
            padding: 18px 40px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border-color); background: rgba(17,24,35,0.9);
            backdrop-filter: blur(10px); position: relative; z-index: 10;
        }
        .auth-nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .auth-nav-logo img { height: 38px; }
        .auth-nav-logo span { font-size: 1.2rem; font-weight: 700; color: var(--text-main); }
        .auth-nav-logo span em { color: var(--p-color); font-style: normal; }

        .auth-body {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 60px 20px; position: relative; z-index: 5;
        }

        .auth-card {
            background: rgba(17, 24, 35, 0.9); border: 1px solid var(--border-color);
            border-radius: 20px; padding: 50px 45px; width: 100%; max-width: 480px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,229,255,0.05);
            backdrop-filter: blur(20px); animation: cardIn 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }
        @keyframes cardIn { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

        .auth-icon-center { text-align: center; margin-bottom: 25px; }
        .auth-icon-center .icon-circle {
            display: inline-flex; align-items: center; justify-content: center;
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(0,229,255,0.1); border: 2px solid rgba(0,229,255,0.3);
            font-size: 2rem; color: var(--p-color); box-shadow: 0 0 30px rgba(0,229,255,0.2);
            animation: floatAnim 4s ease-in-out infinite;
        }

        .auth-heading { text-align: center; margin-bottom: 35px; }
        .auth-heading h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; color: var(--text-main); }
        .auth-heading h1 span { color: var(--p-color); }
        .auth-heading p { color: var(--text-muted); font-size: 0.95rem; }

        .form-group { margin-bottom: 22px; position: relative; }
        .form-group label {
            display: block; margin-bottom: 8px; color: var(--text-muted);
            font-size: 0.85rem; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
        }
        .input-wrapper { position: relative; }
        .input-icon {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); font-size: 0.9rem; pointer-events: none; transition: color 0.3s;
        }
        .form-input {
            width: 100%; padding: 13px 14px 13px 40px; background: rgba(10, 14, 20, 0.8);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
            color: var(--text-main); font-family: var(--font-family); font-size: 0.95rem; transition: all 0.3s;
        }
        .form-input:focus {
            outline: none; border-color: var(--p-color);
            background: rgba(0,229,255,0.03); box-shadow: 0 0 0 3px rgba(0,229,255,0.08);
        }
        .input-wrapper:focus-within .input-icon { color: var(--p-color); }

        .toggle-pw {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--text-muted);
            cursor: pointer; font-size: 0.9rem; transition: color 0.3s; padding: 0;
        }
        .toggle-pw:hover { color: var(--p-color); }

        .strength-bar { height: 4px; border-radius: 2px; background: rgba(255,255,255,0.08); margin-top: 8px; overflow: hidden; }
        .strength-fill { height: 100%; width: 0%; border-radius: 2px; transition: all 0.4s ease; }
        .strength-label { font-size: 0.78rem; margin-top: 5px; color: var(--text-muted); }

        .auth-submit-btn {
            width: 100%; padding: 14px; background: var(--p-color); color: var(--bg-dark);
            border: none; border-radius: 10px; font-family: var(--font-family);
            font-size: 1rem; font-weight: 700; cursor: pointer; letter-spacing: 0.5px;
            transition: all 0.3s; box-shadow: 0 0 20px rgba(0,229,255,0.3);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .auth-submit-btn:hover { background: #fff; box-shadow: 0 0 30px rgba(255,255,255,0.3); transform: translateY(-2px); }
        .auth-submit-btn:active { transform: translateY(0); }

        .form-message {
            padding: 12px 16px; border-radius: 8px; font-size: 0.9rem; font-weight: 600;
            margin-bottom: 20px; display: none;
        }
        .form-message.error { background: rgba(255, 23, 68, 0.1); border: 1px solid rgba(255, 23, 68, 0.3); color: #ff1744; display: flex; align-items: center; gap: 8px; }
        .form-message.success { background: rgba(0, 229, 255, 0.1); border: 1px solid rgba(0, 229, 255, 0.3); color: var(--p-color); display: flex; align-items: center; gap: 8px; }

        .input-error { border-color: #ff1744 !important; }
        .field-error { color: #ff1744; font-size: 0.8rem; margin-top: 5px; display: none; }
        .field-error.show { display: block; }
    </style>
</head>
<body>
    <div class="auth-page">
        <!-- Navbar -->
        <nav class="auth-navbar">
            <a href="index.html" class="auth-nav-logo">
                <img src="logo.png" alt="Zalren">
                <span>Zalren<em>SMP</em></span>
            </a>
        </nav>

        <div class="auth-body">
            <div class="auth-card">
                <div class="auth-icon-center">
                    <div class="icon-circle">
                        <i class="fa-solid fa-key"></i>
                    </div>
                </div>

                <div class="auth-heading">
                    <h1>Reset <span>Password</span></h1>
                    <p>Enter your new password below.</p>
                </div>

                <div class="form-message" id="rp-message"></div>

                <form id="rp-form" novalidate>
                    <div class="form-group">
                        <label>New Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="rp-new" class="form-input" placeholder="Min. 8 characters" autocomplete="new-password">
                            <i class="fa-solid fa-lock input-icon"></i>
                            <button type="button" class="toggle-pw" data-target="rp-new">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                        <div class="strength-bar"><div class="strength-fill" id="rp-strength-fill"></div></div>
                        <div class="strength-label" id="rp-strength-label">Enter a new password</div>
                        <div class="field-error" id="rp-new-err">Password must be at least 8 characters.</div>
                    </div>

                    <div class="form-group">
                        <label>Confirm New Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="rp-confirm" class="form-input" placeholder="Repeat new password" autocomplete="new-password">
                            <i class="fa-solid fa-lock input-icon"></i>
                            <button type="button" class="toggle-pw" data-target="rp-confirm">
                                <i class="fa-solid fa-eye"></i>
                            </button>
                        </div>
                        <div class="field-error" id="rp-confirm-err">Passwords do not match.</div>
                    </div>

                    <button type="submit" class="auth-submit-btn" id="rp-submit-btn">
                        <i class="fa-solid fa-arrow-right"></i>
                        Reset Password
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Password toggles
        document.querySelectorAll('.toggle-pw').forEach(btn => {
            btn.addEventListener('click', () => {
                const input = document.getElementById(btn.dataset.target);
                const icon = btn.querySelector('i');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.replace('fa-eye', 'fa-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.replace('fa-eye-slash', 'fa-eye');
                }
            });
        });

        // Password strength logic
        const rpNew = document.getElementById('rp-new');
        const rpFill = document.getElementById('rp-strength-fill');
        const rpLbl = document.getElementById('rp-strength-label');
        if (rpNew) {
            rpNew.addEventListener('input', () => {
                const v = rpNew.value;
                let s = 0;
                if (v.length >= 8) s++;
                if (/[A-Z]/.test(v)) s++;
                if (/[0-9]/.test(v)) s++;
                if (/[^A-Za-z0-9]/.test(v)) s++;
                const lvls = [
                    {p:'0%',c:'transparent',l:'Enter a new password'},
                    {p:'25%',c:'#ff1744',l:'Weak'},
                    {p:'50%',c:'#ff9100',l:'Fair'},
                    {p:'75%',c:'#ffea00',l:'Good'},
                    {p:'100%',c:'#00e5ff',l:'💪 Strong'},
                ];
                rpFill.style.width = lvls[s].p;
                rpFill.style.background = lvls[s].c;
                rpLbl.textContent = lvls[s].l;
                rpLbl.style.color = lvls[s].c === 'transparent' ? 'var(--text-muted)' : lvls[s].c;
            });
        }

        const form = document.getElementById('rp-form');
        const rpConfirm = document.getElementById('rp-confirm');
        const npErr = document.getElementById('rp-new-err');
        const cfErr = document.getElementById('rp-confirm-err');
        const msgBox = document.getElementById('rp-message');
        const btn = document.getElementById('rp-submit-btn');

        // Extract token from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            msgBox.className = 'form-message error';
            msgBox.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Invalid or missing reset token.';
            msgBox.style.display = 'flex';
            form.style.display = 'none';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            let valid = true;

            [rpNew, rpConfirm].forEach(el => el.classList.remove('input-error'));
            [npErr, cfErr].forEach(el => el.classList.remove('show'));
            msgBox.style.display = 'none';

            if (rpNew.value.length < 8) { rpNew.classList.add('input-error'); npErr.classList.add('show'); valid = false; }
            if (rpNew.value !== rpConfirm.value || !rpConfirm.value) { rpConfirm.classList.add('input-error'); cfErr.classList.add('show'); valid = false; }
            if (!valid) return;

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Resetting...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword: rpNew.value })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to reset password');
                }

                msgBox.className = 'form-message success';
                msgBox.innerHTML = '<i class="fa-solid fa-circle-check"></i> Password reset successfully. Redirecting to login...';
                msgBox.style.display = 'flex';
                form.style.display = 'none';

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);

            } catch (err) {
                msgBox.className = 'form-message error';
                msgBox.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> ' + err.message;
                msgBox.style.display = 'flex';
                btn.innerHTML = '<i class="fa-solid fa-arrow-right"></i> Reset Password';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
