!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password &bull; Zalren</title>
    <meta name="description" content="Reset your Zalren account password">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle, rgba(10, 14, 20, 0.85), rgba(6, 9, 14, 0.98)), url('purple_bg.png') no-repeat center center;
            background-size: cover;
            position: relative;
            overflow: hidden;
        }

        .auth-page::before {
            content: '';
            position: fixed;
            top: -200px;
            left: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0,229,255,0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: orbFloat1 8s ease-in-out infinite;
        }
        .auth-page::after {
            content: '';
            position: fixed;
            bottom: -200px;
            right: -200px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0,100,180,0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: orbFloat2 10s ease-in-out infinite;
        }
        @keyframes orbFloat1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(60px,40px)} }
        @keyframes orbFloat2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-40px,-60px)} }

        .auth-navbar {
            padding: 18px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            background: rgba(17,24,35,0.9);
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 10;
        }
        .auth-nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .auth-nav-logo img { height: 38px; }
        .auth-nav-logo span { font-size: 1.2rem; font-weight: 700; color: var(--text-main); }
        .auth-nav-logo span em { color: var(--p-color); font-style: normal; }
        .auth-back-link {
            color: var(--text-muted); text-decoration: none; font-size: 0.9rem;
            font-weight: 600; display: flex; align-items: center; gap: 8px; transition: color 0.3s;
        }
        .auth-back-link:hover { color: var(--p-color); }

        .auth-body {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 60px 20px; position: relative; z-index: 5;
        }

        .auth-card {
            background: rgba(17, 24, 35, 0.9);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 50px 45px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,229,255,0.05);
            backdrop-filter: blur(20px);
            animation: cardIn 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }
        @keyframes cardIn { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

        .auth-icon-center { text-align: center; margin-bottom: 25px; }
        .auth-icon-center .icon-circle {
            display: inline-flex; align-items: center; justify-content: center;
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(0,229,255,0.1); border: 2px solid rgba(0,229,255,0.3);
            font-size: 2rem; color: var(--p-color);
            box-shadow: 0 0 30px rgba(0,229,255,0.2);
            animation: floatAnim 4s ease-in-out infinite;
        }

        .auth-heading { text-align: center; margin-bottom: 35px; }
        .auth-heading h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; color: var(--text-main); }
        .auth-heading h1 span { color: var(--p-color); }
        .auth-heading p { color: var(--text-muted); font-size: 0.95rem; }

        .form-group { margin-bottom: 22px; position: relative; }
        .form-group label {
            display: block; margin-bottom: 8px; color: var(--text-muted);
            font-size: 0.85rem; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
        }
        .input-wrapper { position: relative; }
        .input-icon {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: var(--text-muted); font-size: 0.9rem; pointer-events: none; transition: color 0.3s;
        }
        .form-input {
            width: 100%; padding: 13px 14px 13px 40px;
            background: rgba(10, 14, 20, 0.8);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px; color: var(--text-main); font-family: var(--font-family);
            font-size: 0.95rem; transition: all 0.3s;
        }
        .form-input:focus {
            outline: none; border-color: var(--p-color);
            background: rgba(0,229,255,0.03); box-shadow: 0 0 0 3px rgba(0,229,255,0.08);
        }
        .input-wrapper:focus-within .input-icon { color: var(--p-color); }

        .auth-submit-btn {
            width: 100%; padding: 14px; background: var(--p-color); color: var(--bg-dark);
            border: none; border-radius: 10px; font-family: var(--font-family);
            font-size: 1rem; font-weight: 700; cursor: pointer; letter-spacing: 0.5px;
            transition: all 0.3s; box-shadow: 0 0 20px rgba(0,229,255,0.3);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .auth-submit-btn:hover { background: #fff; box-shadow: 0 0 30px rgba(255,255,255,0.3); transform: translateY(-2px); }
        .auth-submit-btn:active { transform: translateY(0); }

        .form-message {
            padding: 12px 16px; border-radius: 8px; font-size: 0.9rem; font-weight: 600;
            margin-bottom: 20px; display: none;
        }
        .form-message.error { background: rgba(255, 23, 68, 0.1); border: 1px solid rgba(255, 23, 68, 0.3); color: #ff1744; display: flex; align-items: center; gap: 8px; }
        .form-message.success { background: rgba(0, 229, 255, 0.1); border: 1px solid rgba(0, 229, 255, 0.3); color: var(--p-color); display: flex; align-items: center; gap: 8px; }

        .input-error { border-color: #ff1744 !important; }
        .field-error { color: #ff1744; font-size: 0.8rem; margin-top: 5px; display: none; }
        .field-error.show { display: block; }
    </style>
</head>
<body>
    <div class="auth-page">
        <!-- Navbar -->
        <nav class="auth-navbar">
            <a href="index.html" class="auth-nav-logo">
                <img src="logo.png" alt="Zalren">
                <span>Zalren<em>SMP</em></span>
            </a>
            <a href="login.html" class="auth-back-link">
                <i class="fa-solid fa-arrow-left"></i> Back to Login
            </a>
        </nav>

        <!-- Forgot Password Card -->
        <div class="auth-body">
            <div class="auth-card">
                <div class="auth-icon-center">
                    <div class="icon-circle">
                        <i class="fa-solid fa-envelope"></i>
                    </div>
                </div>

                <div class="auth-heading">
                    <h1>Forgot <span>Password</span></h1>
                    <p>Enter your email address and we'll send you a link to reset your password.</p>
                </div>

                <div class="form-message" id="fp-message"></div>

                <form id="fp-form" novalidate>
                    <div class="form-group">
                        <label>Email Address</label>
                        <div class="input-wrapper">
                            <input type="email" id="fp-email" class="form-input" placeholder="you@domain.com" autocomplete="email">
                            <i class="fa-solid fa-at input-icon"></i>
                        </div>
                        <div class="field-error" id="fp-email-err">Please enter a valid email address.</div>
                    </div>

                    <button type="submit" class="auth-submit-btn" id="fp-submit-btn">
                        <i class="fa-solid fa-paper-plane"></i>
                        Send Reset Link
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('fp-form');
        const emailInput = document.getElementById('fp-email');
        const emailErr = document.getElementById('fp-email-err');
        const msgBox = document.getElementById('fp-message');
        const btn = document.getElementById('fp-submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            
            emailInput.classList.remove('input-error');
            emailErr.classList.remove('show');
            msgBox.style.display = 'none';

            if (!email || !email.includes('@')) {
                emailInput.classList.add('input-error');
                emailErr.classList.add('show');
                return;
            }

            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to request password reset');
                }

                msgBox.className = 'form-message success';
                msgBox.innerHTML = '<i class="fa-solid fa-circle-check"></i> ' + (data.message || 'If an account with that email exists, we sent a password reset link.');
                msgBox.style.display = 'flex';
                form.reset();

            } catch (err) {
                msgBox.className = 'form-message error';
                msgBox.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> ' + err.message;
                msgBox.style.display = 'flex';
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Send Reset Link';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
